name: Build Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://${{ secrets.REGISTRY_HOST }}/api/packages/moonfloof/npm/"
          scope: "@moonfloof"

      - name: Login to Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker Image
        env:
          SHORT_HASH: ${{ gitea.sha }}
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_NAME: ${{ gitea.repository }}
        run: |
          # Build the image and tag as "latest"
          docker build --build-arg BUILD_IDENTIFIER=${SHORT_HASH:0:7} -t $REGISTRY_HOST/$REGISTRY_USERNAME/$REGISTRY_NAME:latest .

      - name: Push Docker Images
        env:
        run: |
          docker push $REGISTRY_HOST/$REGISTRY_USERNAME/$REGISTRY_NAME:${SHORT_HASH:0:7}
          docker push $REGISTRY_HOST/$REGISTRY_USERNAME/$REGISTRY_NAME:latest

      - name: Log out from registry
        env:
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
        run: "docker logout $REGISTRY_HOST"
